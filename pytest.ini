[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -p no:cacheprovider -ra
# Domain/contract tests are pure + the headless harness is deterministic, so
# runs must terminate quickly. (The repo-root conftest.py prevents code.py from
# being imported as the stdlib 'code' module and starting the app loop.)
